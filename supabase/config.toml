# Supabase CLI local development configuration.
# Ports intentionally use the 54000 range to avoid 3000-3999 app ports.

[api]
# API endpoint exposed to your application.
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Local PostgreSQL port for direct DB access.
port = 54322
major_version = 15

[studio]
# Supabase Studio UI port.
port = 54323

[inbucket]
# Local email testing inbox UI and API.
port = 54324

[auth]
# Placeholder URL for your app. Set this to your own Next.js app URL.
site_url = "http://YOUR_NEXTJS_APP_URL_HERE"
additional_redirect_urls = []

[auth.email]
# Disable email confirmation locally for faster development.
enable_confirmations = false
